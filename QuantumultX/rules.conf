# 策略组
[policy]
# 策略类型：
#   static 手动选择节点/策略组
#   available 按顺序选择列表中第一个可用的节点
#   round-robin 按列表的顺序轮流使用其中的节点
#   url-latency-benchmark 延迟策略组，选取延迟最优节点
#   dest-hash 随机负载均衡，但相同域名走固定节点
#   ssid 根据所设定的网络来自动切换节点/策略组
# img-url：指定策略组图标，可远程，也可本地/iCloud(QuantumultX/Images路径下) （108*108）
# direct/proxy/reject 只能用本地图标，名字分别为 direct.png, proxy.png, reject.png 放置于 Images 文件夹下即可生效 (108*108)

