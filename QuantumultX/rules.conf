# check-interval（单位：秒）：自动检测当前策略组下各节点速度，默认 每7天 测速一次
# tolerance：公差，不建议修改
# url-latency-benchmark：自定义策略组，根据 server-tag-regex 正则表达式，将指定的节点归于此策略组下。删除[check-interval=... tolerance=...]即可手动选择节点

#url-latency-benchmark=自动选择, server-tag-regex=^(?!.*(?:网易|墨鱼)).*$, check-interval=3600, tolerance=0, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
url-latency-benchmark=静态住宅或ISP, server-tag-regex=(?=.*(静态|住宅|(?i)ISP))^((?!(中转|机房)).)*$, check-interval=604800, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/China.png
url-latency-benchmark=个人VPS_01, server-tag-regex=(?=.*(Pri_V_01|P_VPS_01)), check-interval=604800, tolerance=0, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Personal.png
