# 本地分流规则(对于完全相同的某条规则，本地的将优先生效)
[filter_local]
# 如开启其他设置中的 “分流匹配优化” 选项，则匹配优先级为：host > host-suffix > host-keyword(wildcard) > geoip = ip-cidr > user-agennt

# 完整域名匹配：host, www.google.com, proxy
# 域名关键词匹配：host-keyword, adsite, reject
# 域名后缀匹配：host-suffix, googleapis.com, proxy
# 域名通配符匹配： host-wildcard, *abc.com, proxy
# User-Agent 匹配：user-agent, ?abc*, proxy
# 强制分流走蜂窝网络：host-suffix, googleapis.com, proxy, force-cellular
# 让分流走蜂窝网络跟 Wi-Fi 中的优选结果：host-suffix, googleapis.com, proxy, multi-interface
# 让分流走蜂窝网络跟 Wi-Fi 中的负载均衡，提供更大带宽出入接口：host-suffix, googleapis.com, proxy, multi-interface-balance
# 指定分流走特定网络接口：host-suffix, googleapis.com, proxy, via-interface=pdp_ip0

# %TUN% 参数，回传给 Quantumult X 接口，可用于曲线实现代理链功能
# host-suffix, example.com, ServerA, via-interface=%TUN%
# ip-cidr, ServerA's IP Range, ServerB


# > 一些比较容易忽视的分流
host, ad.12306.cn, direct
host, sdkapp.uve.weibo.com, direct
host-suffix, ddgksf2013.top, proxy

# > local
ip-cidr, 10.0.0.0/8, direct
ip-cidr, 127.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 224.0.0.0/24, direct
ip-cidr, 182.254.116.0/24, direct

# > 自定义分流规则
host-keyword, google, 谷歌服务
host-keyword, youtube, YouTube


# > 在 本地/远程 分流规则中未匹配到的请求，将走此处，final 不能注释掉或删除
geoip, cn, direct
final, 兜底线路



[http_backend]
# > Boxjs设置，改为使用http backend方式，访问地址改为http://127.0.0.1:9999，更新配置后请长按风车-更新，然后重启代理
# > BoxJs相关教程参考「https://docs.boxjs.app」
https://raw.githubusercontent.com/chavyleung/scripts/master/chavy.box.js, host=boxjs.com, tag=BoxJS, path=^/, enabled=false


# 证书&主机名
[mitm]

skip_validating_cert = true
force_sni_domain_name = false

hostname = -testflight.apple.com, -*.fcbox.com, -*huami.com, -*amemv.com, -*snssdk.com, -www.google.com

# 注意：passphrase和p12代为证书&主机名部分, 更新配置前可把旧的配置中passphrase和p12代码拷贝下来, 导入新的配置文件把内容粘贴在对应位置就不用重装证书